{% extends "polls_webapp/base.html" %}
{% load static i18n %}

{% block body %}
  <div class="container py-5" style="max-width: 560px;">
    <h4 class="mb-2">Вход</h4>
    <p class="text-muted mb-4">
      Откройте эту страницу из Telegram (WebApp). Мы автоматически авторизуем вас.
    </p>

    <div class="alert alert-warning d-none" id="tgAuthError"></div>

    <form id="tgAuthForm" method="post" action="{% url 'polls_webapp:telegram_auth' %}">
      {% csrf_token %}
      <input type="hidden" name="initData" id="initDataField" />
      <input type="hidden" name="next" value="{{ request.GET.next }}" />
      <button class="btn btn-primary" type="submit">Войти через Telegram</button>
    </form>
  </div>

  <script>
    (function () {
      const err = document.getElementById("tgAuthError");
      const tg = window.Telegram?.WebApp;
      if (!tg) {
        err.classList.remove("d-none");
        err.textContent = "Telegram WebApp API не найден. Откройте webapp внутри Telegram.";
        return;
      }

      // Some clients expose initData reliably only after ready().
      try {
        tg.ready();
      } catch (_) {}

      const initData = tg.initData || "";
      const initDataField = document.getElementById("initDataField");
      initDataField.value = initData;

      if (!initData) {
        err.classList.remove("d-none");
        err.textContent = "initData не найден. Откройте webapp из Telegram.";
        return;
      }

      // If initData is present, login can happen immediately.
      const form = document.getElementById("tgAuthForm");
      if (form) form.submit();
    })();
  </script>
{% endblock body %}
